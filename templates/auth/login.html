{% extends "base.html" %}

{% block title %}Vino - Sign In{% endblock %}

{% block content %}
<div class="section">
    <div class="container">
        <div class="row">
            <div class="col s12 m6 offset-m3">
                <div class="card">
                    <div class="card-content">
                        <span class="card-title center-align">Sign In</span>
                        <p class="center-align grey-text" style="margin-bottom: 2rem;">
                            Sign in with your Google or Microsoft account
                        </p>
                        <div class="center-align">
                            <a href="{% url 'social:begin' 'google-oauth2' %}"
                               class="btn-large waves-effect waves-light red darken-1"
                               style="width: 100%; margin-bottom: 1rem;">
                                <i class="material-icons left">mail</i>
                                Sign in with Google
                            </a>
                            <a href="{% url 'social:begin' 'microsoft-graph' %}"
                               class="btn-large waves-effect waves-light blue darken-3"
                               style="width: 100%;">
                                <i class="material-icons left">business</i>
                                Sign in with Microsoft
                            </a>
                        </div>
                    </div>
                    <div class="card-action center-align">
                        <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
