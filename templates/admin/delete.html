{% extends "base.html" %}

{% block title %}Delete {{ object_name }} — Admin{% endblock %}

{% block content %}
<div class="container" style="margin-top: 20px;">
    <div class="row">
        <div class="col s12 m6 offset-m3">
            <div class="card">
                <form method="post">
                    {% csrf_token %}
                    <div class="card-content">
                        <span class="card-title red-text">
                            <i class="material-icons">warning</i> Confirm Delete
                        </span>
                        <p>Are you sure you want to delete <strong>{{ object_name }}</strong>?</p>
                        <p class="grey-text">This action will soft-delete the record (set is_active = False).</p>
                    </div>
                    <div class="card-action right-align">
                        <a href="{{ cancel_url }}" class="btn-flat waves-effect">Cancel</a>
                        <button type="submit" class="btn red waves-effect waves-light">
                            <i class="material-icons left">delete</i>Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
