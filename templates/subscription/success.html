{% extends "base.html" %}

{% block title %}Subscription Active — Trip Me{% endblock %}

{% block content %}
<div class="container" style="margin-top: 60px; padding-bottom: 40px;">
    <div class="row">
        <div class="col s12 m6 offset-m3">
            <div class="card" style="border-radius: 12px; text-align: center;">
                <div class="card-content" style="padding: 40px;">
                    <i class="material-icons" style="font-size: 4rem; color: #43a047;">check_circle</i>
                    <h4 style="font-weight: 700; color: #333; margin: 16px 0 8px;">You're All Set!</h4>
                    <p style="color: #9e9e9e; font-size: 1rem;">Your subscription is now active. Enjoy all the features of Trip Me.</p>
                    <div style="margin-top: 24px;">
                        <a href="{% url 'landing' %}" class="btn waves-effect waves-light" style="background: #7e57c2; border-radius: 8px;">
                            <i class="material-icons left">dashboard</i> Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
