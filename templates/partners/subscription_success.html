{% extends "base.html" %}

{% block title %}Subscription Active — Trip Me{% endblock %}

{% block content %}
<div class="container" style="margin-top: 40px; padding-bottom: 30px; max-width: 600px;">
    <div class="card" style="border-radius: 12px;">
        <div class="card-content center-align" style="padding: 40px 30px;">
            <i class="material-icons" style="font-size: 4rem; color: #43a047;">check_circle</i>
            <h5 style="font-weight: 700; color: #333; margin: 12px 0 4px;">Subscription Active!</h5>
            <p class="grey-text" style="font-size: 0.95rem;">
                {{ partner.business_name }} is now on the <strong>{{ partner.get_tier_display }}</strong> plan.
            </p>
            <div style="margin-top: 24px; display: flex; gap: 10px; justify-content: center;">
                <a href="{% url 'partner_dashboard' %}" class="btn waves-effect waves-light" style="background: #7e57c2;">
                    <i class="material-icons left">dashboard</i> Partner Dashboard
                </a>
                <a href="{% url 'partner_pricing' %}" class="btn-flat waves-effect">
                    View Plans
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
