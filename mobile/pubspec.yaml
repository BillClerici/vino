name: vino_mobile
description: "Vino - Wine Trip Tracking Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Auth
  google_sign_in: ^6.2.2
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.4

  # Models (codegen)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Push Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # UI / Maps
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Media
  image_picker: ^1.1.2

  # Web support
  web: ^1.1.1

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  shared_preferences: ^2.5.3
  connectivity_plus: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
