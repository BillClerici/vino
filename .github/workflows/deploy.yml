name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements/prod.txt

      - name: Run Django migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          # Use DIRECT connection for migrations (bypasses PgBouncer)
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL_DIRECT }}
          DATABASE_URL_DIRECT: ${{ secrets.SUPABASE_DATABASE_URL_DIRECT }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
        run: python manage.py migrate --no-input

      - name: Verify no pending migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL_DIRECT }}
          DATABASE_URL_DIRECT: ${{ secrets.SUPABASE_DATABASE_URL_DIRECT }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
        run: |
          python manage.py showmigrations --list | grep -E "\[ \]" && echo "::error::Pending migrations found!" && exit 1 || echo "All migrations applied"

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to ECS
        run: |
          ENV=${{ github.event.inputs.environment || 'dev' }}
          echo "Deploying to $ENV..."
          bash scripts/deploy.sh $ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
