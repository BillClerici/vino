name: Mobile CI

on:
  push:
    paths:
      - 'mobile/**'
  pull_request:
    paths:
      - 'mobile/**'

jobs:
  flutter-analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze --no-pub --no-fatal-infos --no-fatal-warnings

  build-android:
    if: github.ref == 'refs/heads/main'
    needs: [flutter-analyze]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
      - run: flutter pub get
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://vino-production.up.railway.app \
            --dart-define=GOOGLE_CLIENT_ID=520560916664-27j152ocl7l7ksq3madpf4eb45uplpn7.apps.googleusercontent.com \
            --dart-define=BUILD_NUMBER=${{ github.run_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
